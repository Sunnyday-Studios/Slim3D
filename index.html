<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Slim3D</title>
    <style>
      :root { color-scheme: dark; }
      body, html {
        height: 100%; width: 100%; margin: 0;
        background: #0b0f14;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #d7e2ee;
        overflow: hidden;
      }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }

      .panel {
        position: fixed; z-index: 10;
        background: rgba(12, 18, 26, 0.55);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(120, 160, 200, 0.18);
        border-radius: 10px;
        padding: 10px 12px;
        user-select: none;
      }
      #brand { top: 16px; left: 16px; }
      #brand h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; font-weight: 700; }
      #brand h1 span { color: #56d1c4; }
      #brand p { margin: 2px 0 0; font-size: 11px; opacity: 0.7; }

      #stats { top: 16px; right: 16px; font-variant-numeric: tabular-nums; font-size: 13px; min-width: 92px; }
      #stats div { display: flex; justify-content: space-between; gap: 12px; }
      #stats b { color: #8fe9dd; font-weight: 600; }

      #controls { bottom: 16px; left: 16px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
      #controls button {
        all: unset; cursor: pointer; text-align: center;
        background: rgba(86, 209, 196, 0.16); border: 1px solid rgba(86, 209, 196, 0.4);
        border-radius: 8px; padding: 6px 10px; color: #aef4ea;
      }
      #controls button:hover { background: rgba(86, 209, 196, 0.28); }
      #controls label { display: flex; align-items: center; gap: 6px; opacity: 0.85; cursor: pointer; }
      #hint { opacity: 0.6; font-size: 11px; line-height: 1.5; margin-top: 2px; }

      #status {
        position: fixed; bottom: 16px; right: 16px; z-index: 10;
        font-size: 12px; opacity: 0.8; max-width: 320px; text-align: right;
      }
      #status.error { color: #ff8e8e; opacity: 1; }
    </style>
  </head>
  <body>
    <canvas id="fluidCanvas"></canvas>

    <div id="brand" class="panel">
      <h1>Slim<span>3D</span></h1>
      <p>MLS-MPM · WebGPU · v0.0.1</p>
    </div>

    <div id="stats" class="panel">
      <div>FPS <b id="fps">—</b></div>
      <div>Particles <b id="count">—</b></div>
    </div>

    <div id="controls" class="panel">
      <button id="reset">Reset blob</button>
      <label><input type="checkbox" id="showParticles" /> Show particles (debug)</label>
      <div id="hint"><b>Drag</b> orbit · <b>Scroll</b> zoom<br />Poke interaction: coming next</div>
    </div>

    <div id="status">loading…</div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
